server {
    listen 80;
    server_name _;

    # Redirect all HTTP to HTTPS
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name _;

    ssl_certificate /etc/nginx/ssl/fullchain.pem;
    ssl_certificate_key /etc/nginx/ssl/privkey.pem;
    ssl_protocols TLSv1.3;
    ssl_prefer_server_ciphers off;

    # HSTS — 2-year max-age
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;

    # Client static files
    location / {
        root /usr/share/nginx/html;
        try_files $uri $uri/ /index.html;

        # Security headers
        add_header X-Content-Type-Options nosniff always;
        add_header X-Frame-Options DENY always;
        add_header Referrer-Policy no-referrer always;
        add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=(), usb=(), magnetometer=(), gyroscope=(), accelerometer=()" always;
        # Note: 'unsafe-inline' for style-src is required because Vite
        # inlines CSS as a <style> block in the single-file HTML build.
        # This is a deliberate trade-off: single-file distribution
        # (auditable, no external requests) vs strict style-src CSP.
        # script-src does NOT allow unsafe-inline — only styles.
        add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; connect-src 'self' wss:; img-src 'self' data:; font-src 'self'; frame-ancestors 'none'; base-uri 'self'; form-action 'self';" always;
    }

    # WebSocket proxy to drelm server
    location /ws {
        proxy_pass http://server:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;

        # Do not log WebSocket traffic
        access_log off;

        # Do not forward client IP to the backend
        proxy_set_header X-Real-IP "";
        proxy_set_header X-Forwarded-For "";

        # Keep connections alive for CBR
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }
}
